<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SCS - CMFor</title>
  <meta name="description" content="Acesse todas as funcionalidades do nosso app de forma rápida e prática. Baixe agora." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #69bf9e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border-radius: 24px;
      padding: 30px 25px;
      text-align: center;
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.12),
        0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .logo {
      width: 160px;
      height: 160px;
      margin: -90px auto 20px;
      border-radius: 20%;
      object-fit: cover;
      background: #fff;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 28px;
      color: #222;
      margin-bottom: 10px;
    }

    .site-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #69bf9e;
      text-decoration: none;
      font-weight: bold;
      word-break: break-word;
    }

    .site-link:hover {
      text-decoration: underline;
    }

    .description {
      color: #555;
      line-height: 1.5;
      margin-bottom: 25px;
      font-size: 15px;
    }

    .store-button {
      display: block;
      margin-bottom: 15px;
      transition: transform 0.2s ease;
    }

    .store-button:hover {
      transform: translateY(-3px);
    }

    .store-button img {
      width: 180px;
      max-width: 100%;
    }

    @media (max-width: 480px) {
      .card {
        padding: 25px 20px;
      }

      .logo {
        width: 130px;
        height: 130px;
        margin-top: -75px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <img
      src="https://application-logos.s3.amazonaws.com/pPaUcD.jpg"
      alt="Logo SCS - CMFor"
      class="logo"
    >

    <h1>SCS - CMFor</h1>

    <a
      href="https://novavia.net.br/"
      target="_blank"
      class="site-link"
    >
      https://novavia.net.br/
    </a>

    <p class="description">
      Acesse todas as funcionalidades do nosso app de forma rápida e prática.
      Baixe agora.
    </p>

    <a
      class="store-button"
      href="https://play.google.com/store/apps/details?id=br.novavia.scs.app&hl=pt_BR&pli=1"
      target="_blank"
    >
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg"
        alt="Baixar na Google Play"
      >
    </a>

    <a
      class="store-button"
      href="https://apps.apple.com/br/app/scs-app/id6754280534"
      target="_blank"
    >
      <img
        src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg"
        alt="Baixar na App Store"
      >
    </a>

  </div>

</body>
</html>
