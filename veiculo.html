<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Consulta Veículo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.12);
    --accent-red: #f87171;
    --accent-red-dim: rgba(248,113,113,0.12);
    --accent-amber: #fbbf24;
    --text: #f0f0f5;
    --text2: #8888a0;
    --text3: #55556a;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0 0 40px;
  }

  /* HEADER */
  .header {
    padding: 52px 20px 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(74,222,128,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .plate-display {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: .12em;
    color: var(--text);
    line-height: 1;
  }
  .plate-display span {
    color: var(--accent);
  }
  .vehicle-subtitle {
    font-size: 13px;
    color: var(--text2);
    margin-top: 6px;
    font-weight: 300;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    margin-top: 12px;
    font-family: var(--mono);
    letter-spacing: .04em;
  }
  .status-pill::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .status-ok {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(74,222,128,0.2);
  }
  .status-ok::before { background: var(--accent); }
  .status-err {
    background: var(--accent-red-dim);
    color: var(--accent-red);
    border: 1px solid rgba(248,113,113,0.2);
  }
  .status-err::before { background: var(--accent-red); }

  /* SECTIONS */
  .section { padding: 20px 20px 0; }

  .section-title {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .18em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .field {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .field:last-child { border-bottom: none; }

  .field-label {
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .field-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-align: right;
    word-break: break-word;
  }
  .field-value.mono {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
  }

  /* PENDÊNCIAS */
  .pend-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
  }
  .pend-row:last-child { border-bottom: none; }

  .badge {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
  }
  .badge-ok { background: var(--accent-dim); color: var(--accent); }
  .badge-warn { background: var(--accent-red-dim); color: var(--accent-red); }
  .badge-neutral { background: var(--surface2); color: var(--text2); }

  /* DIVIDER METRIC */
  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 20px 20px 0;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .metric-label {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .metric-value {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    font-family: var(--mono);
  }
  .metric-value.ok { color: var(--accent); }
  .metric-value.warn { color: var(--accent-red); }

  /* FOOTER */
  .footer {
    padding: 24px 20px 0;
    text-align: center;
  }
  .footer p {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: .08em;
  }

  /* ERROR STATE */
  .error-state {
    padding: 60px 20px;
    text-align: center;
  }
  .error-icon {
    font-size: 36px;
    margin-bottom: 16px;
  }
  .error-title {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent-red);
    margin-bottom: 8px;
  }
  .error-msg {
    font-size: 13px;
    color: var(--text2);
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
function toCapitalized(str) {
  if (!str) return '';
  return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function maskCpf(cpf) {
  if (!cpf) return '';
  const c = cpf.replace(/\D/g, '');
  if (c.length === 11) return c.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
  if (c.length === 14) return c.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
  return cpf;
}

function render(data) {
  const v = Array.isArray(data) ? data[0] : data;
  if (!v || !v.placa) {
    document.getElementById('app').innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠</div>
        <div class="error-title">Veículo não encontrado</div>
        <div class="error-msg">Nenhum resultado para a placa consultada.</div>
      </div>`;
    return;
  }

  const emCirc = v.situacao && v.situacao.toLowerCase().includes('circula');
  const temMulta = v.quantidadeMulta && v.quantidadeMulta > 0;
  const temRestricao = v.restricoes && v.restricoes.length > 0;

  const plateLetters = v.placa.slice(0, 3);
  const plateNumbers = v.placa.slice(3);

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-label">Consulta de veículo</div>
      <div class="plate-display"><span>${plateLetters}</span>${plateNumbers}</div>
      <div class="vehicle-subtitle">${toCapitalized(v.marcaModelo)} &middot; ${v.anoFab}/${v.anoModelo}</div>
      <span class="status-pill ${emCirc ? 'status-ok' : 'status-err'}">${v.situacao || 'Desconhecido'}</span>
    </div>

    <div class="metrics">
      <div class="metric-card">
        <div class="metric-label">Multas</div>
        <div class="metric-value ${temMulta ? 'warn' : 'ok'}">${v.quantidadeMulta ?? 0}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Restrições</div>
        <div class="metric-value ${temRestricao ? 'warn' : 'ok'}">${v.restricoes ? v.restricoes.length : 0}</div>
      </div>
    </div>

    <div class="section" style="margin-top:20px">
      <div class="section-title">Veículo</div>
      <div class="card">
        <div class="field"><span class="field-label">Tipo</span><span class="field-value">${toCapitalized(v.tipo)}</span></div>
        <div class="field"><span class="field-label">Categoria</span><span class="field-value">${toCapitalized(v.categoria)}</span></div>
        <div class="field"><span class="field-label">Espécie</span><span class="field-value">${toCapitalized(v.especie)}</span></div>
        <div class="field"><span class="field-label">Cor</span><span class="field-value">${toCapitalized(v.cor)}</span></div>
        <div class="field"><span class="field-label">Combustível</span><span class="field-value">${toCapitalized(v.combustivel)}</span></div>
        <div class="field"><span class="field-label">Renavam</span><span class="field-value mono">${v.renavam}</span></div>
        <div class="field"><span class="field-label">Chassi</span><span class="field-value mono">${v.chassi}</span></div>
      </div>
    </div>

    <div class="section" style="margin-top:20px">
      <div class="section-title">Proprietário</div>
      <div class="card">
        <div class="field"><span class="field-label">Nome</span><span class="field-value">${toCapitalized(v.nomeProprietario)}</span></div>
        <div class="field"><span class="field-label">CPF / CNPJ</span><span class="field-value mono">${maskCpf(v.cpfCnpj)}</span></div>
        <div class="field"><span class="field-label">Município</span><span class="field-value">${toCapitalized(v.municipioEmplacamento)} &ndash; ${v.uf}</span></div>
      </div>
    </div>

    ${(temRestricao) ? `
    <div class="section" style="margin-top:20px">
      <div class="section-title">Restrições</div>
      <div class="card">
        ${v.restricoes.map(r => `<div class="pend-row"><span class="field-label">${r}</span><span class="badge badge-warn">Ativa</span></div>`).join('')}
      </div>
    </div>` : ''}

    <div class="footer">
      <p>FROTA.CE &middot; ${new Date().toLocaleDateString('pt-BR')} ${new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}</p>
    </div>
  `;
}

// Tenta pegar o JSON passado pela URL (parâmetro ?data=...)
// No atalho do iPhone: após a requisição, construir a URL com encodeURIComponent(JSON)
// e abrir no Safari / WebView
(function() {
  try {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('data');
    if (raw) {
      const parsed = JSON.parse(decodeURIComponent(raw));
      render(parsed);
      return;
    }
  } catch(e) {}

  // Fallback: exemplo de demonstração
  render([{
    placa:"PSA8785",renavam:"01040202150",chassi:"9C2HB0210FR426571",
    cor:"PRETA",tipo:"MOTOCICLETA",categoria:"PARTICULAR",especie:"PASSAGEIRO",
    combustivel:"GASOLINA",marcaModelo:"HONDA/POP100",anoFab:"2014",anoModelo:"2015",
    nomeProprietario:"MARIA DA ASSUNCAO BRITO DA SILVA",cpfCnpj:"52184617334",
    municipioEmplacamento:"BACABAL",uf:"MA",situacao:"Em Circulacao",
    quantidadeMulta:0,restricoes:[]
  }]);
})();
</script>
</body>
</html>
